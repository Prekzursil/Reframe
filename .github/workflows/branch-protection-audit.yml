name: Branch Protection Audit

on:
  workflow_dispatch:
  schedule:
    - cron: '30 6 * * 1'

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run branch protection audit
        id: audit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p branch-protection-audit
          python3 scripts/audit_branch_protection.py \
            --repo "${GITHUB_REPOSITORY}" \
            --branch main \
            --policy docs/branch-protection-policy.json \
            --out-json branch-protection-audit/audit.json \
            --out-md branch-protection-audit/audit.md

      - name: Print audit summary
        run: |
          set -euo pipefail
          cat branch-protection-audit/audit.md

      - name: Manage findings issue
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require("fs");
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const audit = JSON.parse(fs.readFileSync("branch-protection-audit/audit.json", "utf8"));
            const findingsTitle = "Branch protection audit findings";
            const permissionsTitle = "Branch protection audit inconclusive (permissions)";
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              labels: "area:security",
              per_page: 100,
            });

            const auditIssues = openIssues
              .filter((issue) => !issue.pull_request)
              .filter((issue) => [findingsTitle, permissionsTitle].includes(issue.title))
              .sort((a, b) => a.number - b.number);
            const findingsIssues = auditIssues.filter((issue) => issue.title === findingsTitle);
            const permissionIssues = auditIssues.filter((issue) => issue.title === permissionsTitle);

            const closeIssue = async (issue, reason) => {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: reason,
              });
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: issue.number,
                state: "closed",
                state_reason: "completed",
              });
            };

            if (audit.status === "pass") {
              if (auditIssues.length === 0) {
                core.info("Audit passed and no open branch-protection finding issues exist.");
                return;
              }

              for (const issue of auditIssues) {
                await closeIssue(
                  issue,
                  [
                    "Closing: latest automated branch-protection audit is compliant.",
                    `- Run: ${runUrl}`,
                    "- Status: `pass`",
                  ].join("\n")
                );
              }
              return;
            }

            if (audit.status === "inconclusive_permissions") {
              if (findingsIssues.length > 0) {
                core.warning("Audit is inconclusive due to permissions; leaving existing drift findings unchanged.");
              }
              if (permissionIssues.length > 0) {
                core.info("Inconclusive-permissions tracker already open; skipping duplicate issue updates.");
                return;
              }
              await github.rest.issues.create({
                owner,
                repo,
                title: permissionsTitle,
                body: [
                  "## Status",
                  "- `inconclusive_permissions`",
                  `- Run: ${runUrl}`,
                  "",
                  "## Detail",
                  "- Branch protection endpoint could not be read with current token scope.",
                  "- No policy drift finding was emitted in this run.",
                ].join("\n"),
                labels: ["area:security", "risk:low"],
              });
              return;
            }

            for (const issue of permissionIssues) {
              await closeIssue(
                issue,
                [
                  "Closing: permissions-access tracker superseded by deterministic audit result.",
                  `- Run: ${runUrl}`,
                  `- Status: \`${audit.status}\``,
                ].join("\n")
              );
            }

            const findings = (audit.findings || []).map((f) => `- ${f}`).join("\n") || "- None";
            const body = [
              "## Findings",
              findings,
              "",
              "## Audit status",
              `- Status: \`${audit.status}\``,
              `- Run: ${runUrl}`,
              "",
              "## Required action",
              "- Resolve policy drift, or grant branch-protection read scope for this workflow when status is inconclusive.",
            ].join("\n");

            if (findingsIssues.length > 0) {
              const target = findingsIssues[0];
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: target.number,
                body,
              });

              for (const extra of findingsIssues.slice(1)) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: extra.number,
                  body: `Superseded by #${target.number}.`,
                });
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: extra.number,
                  state: "closed",
                  state_reason: "not_planned",
                });
              }
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title: findingsTitle,
                body,
                labels: ["area:security", "risk:medium"],
              });
            }

      - name: Upload audit artifact
        uses: actions/upload-artifact@v7
        with:
          name: branch-protection-audit
          path: branch-protection-audit
