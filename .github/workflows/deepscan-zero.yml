name: DeepScan Zero

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deepscan-zero:
    name: DeepScan Zero
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Assert DeepScan zero-open gate
        env:
          DEEPSCAN_API_TOKEN: ${{ secrets.DEEPSCAN_API_TOKEN }}
          DEEPSCAN_OPEN_ISSUES_URL: ${{ vars.DEEPSCAN_OPEN_ISSUES_URL }}
        run: |
          python3 scripts/quality/check_deepscan_zero.py \
            --out-json "deepscan-zero/deepscan.json" \
            --out-md "deepscan-zero/deepscan.md"

      - name: Upload DeepScan zero artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deepscan-zero
          path: deepscan-zero
