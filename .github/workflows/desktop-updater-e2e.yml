name: Desktop Updater E2E

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/desktop-updater-e2e.yml"
      - "scripts/desktop_updater_e2e.py"
      - "scripts/desktop_updater_e2e_windows.ps1"
      - "scripts/desktop_updater_e2e_macos.sh"
      - "scripts/desktop_updater_e2e_linux.sh"
      - "scripts/verify_desktop_updater_release.py"
      - "apps/desktop/UPDATER.md"

permissions:
  contents: read

jobs:
  updater-e2e:
    name: Updater E2E (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            runner: windows-latest
          - platform: macos
            runner: macos-latest
          - platform: linux
            runner: ubuntu-22.04
    runs-on: ${{ matrix.runner }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Run updater E2E
        run: |
          python -c "from pathlib import Path; Path('docs/plans').mkdir(parents=True, exist_ok=True)"
          python scripts/desktop_updater_e2e.py --platform "${{ matrix.platform }}"

      - name: Upload updater evidence
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: desktop-updater-e2e-${{ matrix.platform }}
          path: |
            docs/plans/*-updater-e2e-${{ matrix.platform }}.json
            docs/plans/*-updater-e2e-${{ matrix.platform }}.md
