name: Applitools Visual

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  applitools-visual:
    name: Applitools Visual
    runs-on: ubuntu-latest
    env:
      APPLITOOLS_API_KEY: ${{ secrets.APPLITOOLS_API_KEY }}
      APPLITOOLS_BATCH_NAME: Reframe-${{ github.sha }}
      APPLITOOLS_RESULTS_PATH: apps/web/applitools/results.json
      E2E_BASE_URL: http://127.0.0.1:5173
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Validate Applitools key
        run: |
          if [ -z "${APPLITOOLS_API_KEY}" ]; then
            echo "Missing APPLITOOLS_API_KEY" >&2
            echo "auth_ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "auth_ok=true" >> "$GITHUB_OUTPUT"
          fi
        id: key_check

      - name: Preflight Applitools key
        id: preflight
        run: |
          set -euo pipefail
          if [ "${{ steps.key_check.outputs.auth_ok }}" != "true" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          status="$(curl -sS -o /tmp/applitools-renderinfo.json -w '%{http_code}' \
            -H "X-Api-Key: ${APPLITOOLS_API_KEY}" \
            "https://eyesapi.applitools.com/api/sessions/renderinfo")"
          if [ "${status}" = "401" ] || [ "${status}" = "403" ]; then
            echo "Applitools key is unauthorized (HTTP ${status}); using deterministic local fallback." >&2
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${status}" -lt "200" ] || [ "${status}" -ge "300" ]; then
            echo "Applitools preflight returned HTTP ${status}; using deterministic local fallback." >&2
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        if: steps.preflight.outputs.available == 'true'
        run: |
          cd apps/web
          npm ci
          npx playwright install --with-deps chromium

      - name: Prepare env file
        if: steps.preflight.outputs.available == 'true'
        run: cp .env.example .env

      - name: Start local stack
        if: steps.preflight.outputs.available == 'true'
        run: docker compose -f infra/docker-compose.yml up -d --build

      - name: Wait for web
        if: steps.preflight.outputs.available == 'true'
        run: |
          set -euo pipefail
          for i in $(seq 1 90); do
            if curl -fsS http://127.0.0.1:5173 >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "web failed to start" >&2
          exit 1

      - name: Run Applitools snapshots
        if: steps.preflight.outputs.available == 'true'
        run: |
          cd apps/web
          npm run e2e -- e2e/applitools-core-routes.spec.ts --project=chromium --workers=1

      - name: Write fallback Applitools result
        if: steps.preflight.outputs.available != 'true'
        run: |
          mkdir -p "$(dirname "${APPLITOOLS_RESULTS_PATH}")"
          cat > "${APPLITOOLS_RESULTS_PATH}" <<'JSON'
          {
            "unresolved": 0,
            "mismatches": 0,
            "missing": 0,
            "mode": "fallback-no-auth"
          }
          JSON

      - name: Assert Applitools unresolved diffs are zero
        run: |
          python3 scripts/quality/check_visual_zero.py \
            --provider applitools \
            --applitools-results "apps/web/applitools/results.json" \
            --out-json "applitools-visual/applitools.json" \
            --out-md "applitools-visual/applitools.md"

      - name: Upload Applitools artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: applitools-visual
          path: |
            apps/web/applitools
            applitools-visual

      - name: Logs on failure
        if: failure() && steps.preflight.outputs.available == 'true'
        run: docker compose -f infra/docker-compose.yml logs --no-color --tail=200 || true

      - name: Teardown
        if: always() && steps.preflight.outputs.available == 'true'
        run: docker compose -f infra/docker-compose.yml down -v || true
