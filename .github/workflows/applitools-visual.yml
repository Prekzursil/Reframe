name: Applitools Visual

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  applitools-visual:
    name: Applitools Visual
    runs-on: ubuntu-latest
    env:
      APPLITOOLS_API_KEY: ${{ secrets.APPLITOOLS_API_KEY }}
      APPLITOOLS_BATCH_NAME: Reframe-${{ github.sha }}
      APPLITOOLS_RESULTS_PATH: apps/web/applitools/results.json
      E2E_BASE_URL: http://127.0.0.1:5173
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Validate Applitools key
        run: |
          if [ -z "${APPLITOOLS_API_KEY}" ]; then
            echo "Missing APPLITOOLS_API_KEY" >&2
            exit 1
          fi

      - name: Preflight Applitools key
        run: |
          set -euo pipefail
          status="$(curl -sS -o /tmp/applitools-renderinfo.json -w '%{http_code}' \
            -H "X-Api-Key: ${APPLITOOLS_API_KEY}" \
            "https://eyesapi.applitools.com/api/sessions/renderinfo")"
          if [ "${status}" = "403" ]; then
            echo "APPLITOOLS_API_KEY is invalid or unauthorized (HTTP 403)." >&2
            cat /tmp/applitools-renderinfo.json >&2 || true
            exit 1
          fi
          if [ "${status}" -lt "200" ] || [ "${status}" -ge "300" ]; then
            echo "Applitools preflight failed with HTTP ${status}." >&2
            cat /tmp/applitools-renderinfo.json >&2 || true
            exit 1
          fi

      - name: Install dependencies
        run: |
          cd apps/web
          npm ci
          npx playwright install --with-deps chromium

      - name: Prepare env file
        run: cp .env.example .env

      - name: Start local stack
        run: docker compose -f infra/docker-compose.yml up -d --build

      - name: Wait for web
        run: |
          set -euo pipefail
          for i in $(seq 1 90); do
            if curl -fsS http://127.0.0.1:5173 >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "web failed to start" >&2
          exit 1

      - name: Run Applitools snapshots
        run: |
          cd apps/web
          npm run e2e -- e2e/applitools-core-routes.spec.ts --project=chromium --workers=1

      - name: Assert Applitools unresolved diffs are zero
        run: |
          python3 scripts/quality/check_visual_zero.py \
            --provider applitools \
            --applitools-results "apps/web/applitools/results.json" \
            --out-json "applitools-visual/applitools.json" \
            --out-md "applitools-visual/applitools.md"

      - name: Upload Applitools artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: applitools-visual
          path: |
            apps/web/applitools
            applitools-visual

      - name: Logs on failure
        if: failure()
        run: docker compose -f infra/docker-compose.yml logs --no-color --tail=200 || true

      - name: Teardown
        if: always()
        run: docker compose -f infra/docker-compose.yml down -v || true
