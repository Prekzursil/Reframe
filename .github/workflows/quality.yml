name: quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - name: Set up Rust (pinned via rust-toolchain.toml)
        run: rustup show && rustup component add rustfmt clippy

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python tooling + project deps
        run: |
          python -m pip install --upgrade pip
          pip install \
            ruff==0.15.17 \
            basedpyright==1.39.8 \
            pre-commit==4.6.0 \
            pytest pytest-cov httpx
          pip install -r apps/api/requirements.txt -r services/worker/requirements.txt
          pip install -e packages/media-core

      - name: Install web deps
        working-directory: apps/web
        run: npm ci

      - name: Install desktop deps
        working-directory: apps/desktop
        run: npm ci

      - name: Install opengrep + osv-scanner
        run: |
          curl -fsSL https://raw.githubusercontent.com/opengrep/opengrep/main/install.sh | bash -s -- -v 1.22.0
          echo "$HOME/.opengrep/cli/latest" >> "$GITHUB_PATH"
          curl -sSL -o /usr/local/bin/osv-scanner \
            https://github.com/google/osv-scanner/releases/download/v2.3.8/osv-scanner_linux_amd64
          chmod +x /usr/local/bin/osv-scanner

      # gate:1 + gate:5 — lint/format/sec-lint auto-fixers + secrets, verified via pre-commit
      - name: gate-lint-format (pre-commit run --all-files)
        run: pre-commit run --all-files --show-diff-on-failure

      # gate:2 — types (tsc web + desktop, basedpyright python)
      - name: gate-types tsc web
        working-directory: apps/web
        run: npx tsc --noEmit
      - name: gate-types tsc desktop
        working-directory: apps/desktop
        run: npx tsc --noEmit
      - name: gate-types basedpyright
        run: basedpyright

      # gate:3 — tests + coverage (pytest branch 100%, vitest 100%)
      - name: gate-tests-coverage pytest
        env:
          PYTHONPATH: .:apps/api:packages/media-core/src
        run: |
          python -m pytest --rootdir=. \
            apps/api/tests services/worker packages/media-core/tests \
            --cov=apps/api/app --cov=services/worker --cov=packages/media-core/src/media_core \
            --cov-branch --cov-fail-under=100
      - name: gate-tests-coverage vitest web
        working-directory: apps/web
        run: npx vitest run --coverage
      - name: gate-tests-coverage vitest desktop
        working-directory: apps/desktop
        run: npx vitest run --coverage

      # gate:4 — SAST (opengrep, curated in-repo ruleset, clean-zero)
      - name: gate-sast opengrep
        run: |
          opengrep scan --config .quality/opengrep --error \
            --exclude .venv --exclude node_modules --exclude dist \
            apps services packages

      # gate:6 — deps (osv-scanner on the lockfiles, 0 known CVEs)
      - name: gate-deps osv-scanner
        run: |
          osv-scanner scan source \
            --lockfile=apps/web/package-lock.json \
            --lockfile=apps/desktop/package-lock.json \
            --lockfile=apps/desktop/src-tauri/Cargo.lock \
            --lockfile=apps/api/requirements.txt \
            --lockfile=services/worker/requirements.txt

      # charter ↔ workflow consistency
      - name: charter-check
        run: python .quality/charter_check.py
