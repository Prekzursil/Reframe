name: quality

on:
  push:
    branches: [main, media-studio]
  pull_request:
    branches: [main, media-studio]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: "20"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python tooling + sidecar (no heavy ML deps)
        run: |
          python -m pip install --upgrade pip
          pip install \
            ruff==0.15.17 \
            basedpyright==1.39.8 \
            pre-commit==4.6.0 \
            pytest pytest-cov hypothesis
          # The sidecar runtime deps (faster-whisper, scenedetect, torch, ...) are
          # NOT installed in CI; the unit tests are deliberately heavy-ML-free
          # (sidecar/tests/conftest.py). Install the package itself only for its
          # pure-logic modules + the dev extras that the tests need.
          pip install -e "sidecar[dev]" --no-deps
          # httpx: provider tests. numpy + opencv-python-headless: the reframe/
          # face-finder unit tests exercise real cv2 image ops. blake3 (lock-pinned
          # 1.0.9): the L5 hash-verified relink tests stream REAL bytes and assert
          # deterministic digests, so they need the genuine native hasher. All three
          # are light, CI-friendly wheels (NOT heavy ML like torch/faster-whisper,
          # which stay uninstalled). --no-deps above skips these declared deps.
          pip install httpx numpy opencv-python-headless blake3==1.0.9

      - name: Install app (renderer + main) deps
        working-directory: app
        run: npm ci

      - name: Install render-cli deps
        working-directory: app/render-cli
        run: npm ci

      - name: Install opengrep + osv-scanner
        run: |
          curl -fsSL https://raw.githubusercontent.com/opengrep/opengrep/main/install.sh | bash -s -- -v v1.22.0
          echo "$HOME/.opengrep/cli/latest" >> "$GITHUB_PATH"
          curl -sSL -o /usr/local/bin/osv-scanner \
            https://github.com/google/osv-scanner/releases/download/v2.3.8/osv-scanner_linux_amd64
          chmod +x /usr/local/bin/osv-scanner

      # gate:1 + gate:5 — lint/format/sec-lint auto-fixers + secrets, verified via pre-commit
      - name: gate-lint-format (pre-commit run --all-files)
        run: pre-commit run --all-files --show-diff-on-failure

      # gate:2 — types (tsc app + render-cli, basedpyright sidecar)
      - name: gate-types tsc app
        working-directory: app
        run: npx tsc --noEmit
      - name: gate-types tsc render-cli
        working-directory: app/render-cli
        run: npx tsc -p . --noEmit
      - name: gate-types basedpyright
        run: basedpyright

      # gate:3 — tests + coverage (pytest branch 100%, vitest 100%)
      - name: gate-tests-coverage pytest
        working-directory: sidecar
        run: |
          python -m pytest \
            --cov=media_studio \
            --cov-branch --cov-fail-under=100
      - name: gate-tests-coverage vitest app
        working-directory: app
        run: npx vitest run --coverage

      # gate:4 — SAST (opengrep, curated in-repo ruleset, clean-zero)
      - name: gate-sast opengrep
        run: |
          opengrep scan --config .quality/opengrep --error \
            --exclude .venv --exclude node_modules --exclude dist --exclude out \
            app sidecar

      # gate:6 — deps (osv-scanner on the lockfiles, 0 actionable CVEs).
      # --no-resolve: read the FLAT pinned lockfiles directly. The Python lock is a
      # fully-resolved `uv pip compile` output (all transitives pinned), so no
      # transitive re-resolution is needed; this also keeps the scan deterministic
      # and offline-stable. Reasoned, dated per-CVE ignores for non-applicable
      # findings live in osv-scanner.toml (auto-loaded from the repo root).
      - name: gate-deps osv-scanner
        run: |
          osv-scanner scan source \
            --config=osv-scanner.toml \
            --no-resolve \
            --lockfile=app/package-lock.json \
            --lockfile=app/render-cli/package-lock.json \
            --lockfile=sidecar/requirements.lock.txt

      # charter ↔ workflow consistency
      - name: charter-check
        run: python .quality/charter_check.py
