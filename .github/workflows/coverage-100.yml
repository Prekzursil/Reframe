name: Coverage 100

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  coverage-100:
    name: Coverage 100 Gate
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .:apps/api:packages/media-core/src
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies for desktop Rust coverage
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev librsvg2-dev patchelf

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7

      - name: Install Python dependencies
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/pip install -r apps/api/requirements.txt -r services/worker/requirements.txt
          .venv/bin/pip install pytest pytest-cov

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Run Python tests with coverage
        run: |
          mkdir -p coverage
          .venv/bin/python -m pytest \
            --cov=apps/api/app \
            --cov=services/worker \
            --cov=packages/media-core/src/media_core \
            --cov-report=xml:coverage/python-coverage.xml \
            apps/api/tests services/worker packages/media-core/tests

      - name: Run web tests with coverage
        working-directory: apps/web
        run: npm run test:coverage

      - name: Run desktop TypeScript tests with coverage
        working-directory: apps/desktop
        run: npm run test:coverage

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Run desktop Rust tests with coverage
        run: |
          mkdir -p coverage
          cd apps/desktop/src-tauri
          cargo llvm-cov --workspace --all-features --lcov --output-path ../../../coverage/desktop-rust.lcov

      - name: Enforce 100% coverage
        run: |
          .venv/bin/python scripts/quality/assert_coverage_100.py \
            --lcov "web=apps/web/coverage/lcov.info" \
            --lcov "desktop-ts=apps/desktop/coverage/lcov.info" \
            --out-json "coverage-100/coverage.json" \
            --out-md "coverage-100/coverage.md"

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-100
          path: |
            coverage-100
            coverage
            apps/web/coverage
            apps/desktop/coverage
