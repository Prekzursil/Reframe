name: Dependency Audit

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  python-audit:
    name: Python dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install audit tooling
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Audit API + worker requirements
        run: |
          pip-audit -r apps/api/requirements.txt
          pip-audit -r services/worker/requirements.txt

  node-audit:
    name: Node dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Audit web dependencies
        working-directory: apps/web
        run: |
          npm ci
          npm audit --audit-level=high

      - name: Audit desktop dependencies
        working-directory: apps/desktop
        run: |
          npm ci
          npm audit --audit-level=high
