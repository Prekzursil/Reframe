name: e2e

# OPT-IN autonomous end-to-end suite. This NEVER gates a normal PR — it is the
# heavy companion to `quality.yml`. It installs the heavier runtime deps that the
# standard gate deliberately omits (no-heavy-ML rule) and runs the real-pipeline
# / real-ffmpeg / mock-model flows that are excluded from the default gate:
#   * sidecar  : pytest -m e2e            (the `e2e`-marked AI2 hub/director +
#                                          intel/repurpose + NASTY-INPUT real-media
#                                          tests)
#   * sidecar  : real_pipeline_smoke.py   (standalone real-ffmpeg + tiny-whisper
#                                          short-making pipeline)
#   * app      : npm run test:e2e         (Playwright Electron GUI E2E — preview +
#                                          PACKAGED `app.isPackaged` proof)
#   * app      : npm run test:e2e:dom     (vitest DOM caption-over-video + nasty-
#                                          caption proofs)
#   * app      : npm run test:e2e:visual  (Wave-2b VISUAL screenshot-diff +
#                                          A11Y/axe + keyboard/focus/reduced-motion;
#                                          WINDOWS-ONLY — baselines are `*-win32.png`)
#
# OS MATRIX (WU-A): the GUI E2E runs on windows-latest, macos-latest, macos-13,
# and ubuntu-latest. On Windows the leg BUILDS the real electron-builder package
# and drives the SHIPPED .exe (packaged.spec.ts asserts app.isPackaged === true);
# the packaged artifact is Windows-only (electron-builder.yml has a `win:` target
# and the embeddable-CPython/ffmpeg staging in build/python-embed-setup.ps1 is
# PowerShell/Windows-only), so the macOS/Linux legs run the SAME specs against the
# dev build (RF_E2E_DEV=1); packaged.spec.ts self-skips off-Windows. xvfb-run is
# Linux-only (Windows/macOS run the Electron window natively).
#
# Triggered ONLY on demand (workflow_dispatch) or on the nightly schedule, so the
# default `quality.yml` gate (100% coverage, heavy-ML-free) is untouched.

on:
  workflow_dispatch:
  schedule:
    # Nightly at 04:17 UTC (off the hour to avoid GitHub's scheduler congestion).
    - cron: "17 4 * * *"

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-sidecar:
    name: e2e-sidecar (real pipeline + AI/nasty markers)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install sidecar + E2E runtime deps (CPU)
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          # Package itself (pure-logic modules) + dev extras, no heavy transitives.
          pip install -e "sidecar[dev]" --no-deps
          # The CPU runtime deps the opt-in E2E flows actually exercise. Unlike the
          # standard gate, the E2E suite IS allowed the heavier (still CPU-only)
          # stack: real tiny faster-whisper, scenedetect, av, onnxruntime, cv2.
          pip install \
            httpx numpy opencv-python-headless \
            faster-whisper scenedetect av onnxruntime \
            huggingface_hub tokenizers

      - name: E2E sidecar — pytest -m e2e (AI2 hub/director + intel/repurpose + nasty inputs)
        working-directory: sidecar
        run: python -m pytest -m e2e -v

      - name: E2E sidecar — real short-making pipeline smoke (real ffmpeg + tiny whisper)
        run: |
          mkdir -p e2e_artifacts
          # A short sample clip (no speech → tiny whisper honestly returns 0
          # segments; the script reports that explicitly, see the e2e README).
          ffmpeg -y -f lavfi -i testsrc=size=640x360:rate=30:duration=8 \
                 -f lavfi -i sine=frequency=440:duration=8 \
                 -c:v libx264 -pix_fmt yuv420p -c:a aac -shortest \
                 e2e_artifacts/sample.mp4
          export PYTHONPATH="$PWD/sidecar"
          python sidecar/tests/e2e/real_pipeline_smoke.py \
            --sample e2e_artifacts/sample.mp4 \
            --workdir e2e_artifacts/run \
            --repo "$PWD"

      - name: Upload sidecar E2E artifacts
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: e2e-sidecar-artifacts
          path: e2e_artifacts/
          if-no-files-found: ignore
          retention-days: 7

  e2e-gui:
    name: e2e-gui (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      # One red OS leg must NOT cancel the others — we want the full OS picture.
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, macos-13, ubuntu-latest]
    env:
      # electron-builder must never try to discover/notarize a signing identity
      # in CI (it would hang on macOS); this app is unsigned (electron-builder.yml).
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      # ffmpeg is needed on EVERY OS (the fixtures generate the real sample clip).
      - name: Install ffmpeg (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install ffmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Install ffmpeg (Windows)
        if: runner.os == 'Windows'
        run: choco install ffmpeg -y --no-progress

      - name: Install sidecar (stdlib preview path — no ML deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e "sidecar[dev]" --no-deps

      - name: Install app deps
        working-directory: app
        run: npm ci

      - name: Install render-cli deps
        working-directory: app/render-cli
        run: npm ci

      - name: Install Playwright browsers + OS deps
        working-directory: app
        run: npx playwright install --with-deps chromium

      - name: Build app (electron-vite + remotion bundle)
        working-directory: app
        run: npm run build

      - name: Type-check the E2E harness
        working-directory: app
        run: npm run typecheck:e2e

      # --- Windows ONLY: stage the embeddable runtime + build the real package, so
      # the GUI E2E drives the SHIPPED .exe (packaged.spec.ts asserts isPackaged). ---
      - name: Stage packaged runtime (embeddable CPython + ffmpeg)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./build/python-embed-setup.ps1 -WithFfmpeg

      - name: Package the Windows app (electron-builder → dist/)
        if: runner.os == 'Windows'
        working-directory: app
        run: npx electron-builder --config ../electron-builder.yml --win

      - name: E2E GUI — vitest DOM caption + nasty-caption proofs
        working-directory: app
        run: npm run test:e2e:dom

      # The GUI Playwright E2E: on Windows preview.spec drives the packaged .exe
      # (dist/ exists) and packaged.spec asserts isPackaged===true; elsewhere
      # RF_E2E_DEV forces the dev build and packaged.spec self-skips.
      - name: E2E GUI — Playwright Electron (Linux, xvfb)
        if: runner.os == 'Linux'
        working-directory: app
        env:
          RF_PY: ${{ steps.setup-python.outputs.python-path }}
          RF_E2E_DEV: "1"
        run: xvfb-run --auto-servernum npm run test:e2e

      - name: E2E GUI — Playwright Electron (macOS dev build)
        if: runner.os == 'macOS'
        working-directory: app
        env:
          RF_PY: ${{ steps.setup-python.outputs.python-path }}
          RF_E2E_DEV: "1"
        run: npm run test:e2e

      # Windows runs BOTH specs in one invocation: packaged.spec ALWAYS drives the
      # real shipped .exe (it self-forces RF_E2E_REQUIRE_PACKAGED, ignoring
      # RF_E2E_DEV) to prove isPackaged===true / asar / no-console-error + that the
      # .exe wires its first-run bootstrap. preview.spec's DATA-PIPELINE assertions
      # (seeded library / playback / export) run against the dev build because a
      # COLD packaged launch pip-installs the heavy sidecar runtime on first run
      # (multi-minute, network) and cannot answer RPCs inside a CI window — a
      # documented packaged-runtime limitation, not a regression (see app/e2e/README).
      - name: E2E GUI — Playwright Electron (Windows packaged .exe + dev-build pipeline)
        if: runner.os == 'Windows'
        working-directory: app
        env:
          RF_PY: ${{ steps.setup-python.outputs.python-path }}
          RF_E2E_DEV: "1"
        run: npm run test:e2e

      # WAVE-2b VISUAL + A11Y — Windows ONLY. The visual screenshot baselines are
      # platform-specific (committed as `*-win32.png`), so this suite runs on the
      # SINGLE OS its baselines were generated for; the 4-OS e2e-gui matrix's other
      # legs skip it (a missing snapshot would hard-fail a non-baselined OS). The
      # a11y/keyboard checks are DOM-based and OS-independent but ride this same
      # Windows leg to reuse the already-built dev app. Runs against the dev build
      # (RF_E2E_DEV=1) — the same target the baselines were captured against.
      - name: E2E GUI — VISUAL screenshot-diff + A11Y (axe) [Windows only]
        if: runner.os == 'Windows'
        working-directory: app
        env:
          RF_PY: ${{ steps.setup-python.outputs.python-path }}
          RF_E2E_DEV: "1"
        run: npm run test:e2e:visual

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: e2e-gui-playwright-report-${{ matrix.os }}
          path: |
            app/playwright-report/
            app/test-results/
          if-no-files-found: ignore
          retention-days: 7
