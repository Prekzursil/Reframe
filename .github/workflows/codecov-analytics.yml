name: Codecov Analytics

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  codecov-analytics:
    name: Codecov Analytics
    runs-on: ubuntu-latest
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      PYTHONPATH: .:apps/api:packages/media-core/src
    steps:
      - uses: actions/checkout@v6

      - name: Validate Codecov token
        run: |
          if [ -z "${CODECOV_TOKEN}" ]; then
            echo "Missing CODECOV_TOKEN" >&2
            exit 1
          fi

      - name: Install system dependencies for desktop Rust coverage
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev librsvg2-dev patchelf

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7

      - name: Install Python deps
        run: |
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/pip install -r apps/api/requirements.txt -r services/worker/requirements.txt
          .venv/bin/pip install pytest pytest-cov

      - name: Install web deps
        working-directory: apps/web
        run: npm ci

      - name: Install desktop deps
        working-directory: apps/desktop
        run: npm ci

      - name: Run python coverage
        run: |
          mkdir -p coverage
          .venv/bin/python -m pytest \
            --cov=apps/api/app \
            --cov=services/worker \
            --cov=packages/media-core/src/media_core \
            --cov=scripts \
            --cov-report=xml:coverage/python-coverage.xml \
            apps/api/tests services/worker packages/media-core/tests

      - name: Run web coverage
        working-directory: apps/web
        run: npm run test:coverage

      - name: Run desktop TS coverage
        working-directory: apps/desktop
        run: npm run test:coverage

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Run desktop Rust coverage
        run: |
          mkdir -p coverage
          cd apps/desktop/src-tauri
          cargo llvm-cov --workspace --all-features --lcov --output-path ../../../coverage/desktop-rust.lcov

      - name: Upload Python coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/python-coverage.xml
          flags: api,worker,media-core,scripts
          fail_ci_if_error: true
          verbose: true

      - name: Upload web coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/web/coverage/lcov.info
          flags: web
          fail_ci_if_error: true
          verbose: true

      - name: Upload desktop TS coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: apps/desktop/coverage/lcov.info
          flags: desktop-ts
          fail_ci_if_error: true
          verbose: true

      - name: Upload desktop Rust coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/desktop-rust.lcov
          flags: desktop-rust
          fail_ci_if_error: true
          verbose: true
