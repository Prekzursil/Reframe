name: strict-23 Preflight

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run strict-23 preflight
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STAMP: ${{ github.event.pull_request.number || github.run_id }}
        run: |
          set -euo pipefail
          mkdir -p docs/plans strict23-preflight
          python3 scripts/strict23_preflight.py \
            --repo "${GITHUB_REPOSITORY}" \
            --branch main \
            --ref "${GITHUB_SHA}" \
            --policy "docs/branch-protection-policy.json" \
            --out-json "strict23-preflight/preflight.json" \
            --out-md "strict23-preflight/preflight.md"

          cp strict23-preflight/preflight.json "docs/plans/${STAMP}-strict23-preflight.json"
          cp strict23-preflight/preflight.md "docs/plans/${STAMP}-strict23-preflight.md"
          cat strict23-preflight/preflight.md

      - name: Upload strict-23 artifact
        uses: actions/upload-artifact@v7
        with:
          name: strict23-preflight
          path: strict23-preflight
