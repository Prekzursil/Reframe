version: 2
updates:
- package-ecosystem: pip
  directory: /sidecar
  schedule:
    interval: weekly
  open-pull-requests-limit: 10
  groups:
    pip-sidecar-patch-minor:
      patterns:
      - '*'
      update-types:
      - patch
      - minor
  ignore:
  - dependency-name: '*'
    update-types:
    - version-update:semver-major
  # torch / torchvision / torchaudio are GPU-validated, CUDA-wheel-pinned runtime
  # assets (declared in sidecar/pyproject.toml, deliberately NOT in the scanned
  # requirements.lock.txt) and must be bumped together only after manual GPU
  # re-validation (A6 lesson 5) -- never via an unattended Dependabot PR. The open
  # torch advisories (CVE-2025-2148/2149/2953/2998/2999/3000/3001/3730) are all
  # LOCAL attack-vector (AV:L), low/medium, several with no fixed version, and are
  # not reachable in a local desktop app processing the user's own media. Triaged
  # + alerts dismissed 2026-06-29; reopen if the threat model changes.
  - dependency-name: torch
  - dependency-name: torchvision
  - dependency-name: torchaudio
  labels:
  - dependencies
  - type:chore
  - area:ci
- package-ecosystem: npm
  directory: /app
  schedule:
    interval: weekly
  open-pull-requests-limit: 10
  groups:
    npm-app-patch-minor:
      patterns:
      - '*'
      update-types:
      - patch
      - minor
  ignore:
  - dependency-name: '*'
    update-types:
    - version-update:semver-major
  labels:
  - dependencies
  - type:chore
  - area:ci
- package-ecosystem: npm
  directory: /app/render-cli
  schedule:
    interval: weekly
  open-pull-requests-limit: 10
  groups:
    npm-app-render-cli-patch-minor:
      patterns:
      - '*'
      update-types:
      - patch
      - minor
  ignore:
  - dependency-name: '*'
    update-types:
    - version-update:semver-major
  labels:
  - dependencies
  - type:chore
  - area:ci
- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: weekly
  open-pull-requests-limit: 10
  groups:
    github-actions-root-patch-minor:
      patterns:
      - '*'
      update-types:
      - patch
      - minor
  ignore:
  - dependency-name: '*'
    update-types:
    - version-update:semver-major
  labels:
  - dependencies
  - type:chore
  - area:ci
