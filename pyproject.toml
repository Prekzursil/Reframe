# Root tooling config for the lean quality gates.
# The Python sidecar keeps its own build metadata (sidecar/pyproject.toml);
# this file centralizes the shared Ruff + basedpyright gate configuration so the
# gate runs the same way locally and in CI.

[tool.ruff]
# Pinned tool: ruff 0.15.17 (see QUALITY-CHARTER.md).
target-version = "py312"
line-length = 120
# Honor extend-exclude even when pre-commit passes explicit file paths (the gate
# runs ruff via `pre-commit run --all-files`, which feeds a file list); without
# this the vendored _lightasd tree below would still be linted.
force-exclude = true
extend-exclude = [
  ".venv",
  "sidecar/.venv",
  "node_modules",
  "dist",
  "build",
  "out",
  "vendor",
  # Vendored third-party code (Light-ASD MIT; ViNet-S CC-BY-NC-SA; TransNetV2 MIT)
  # kept byte-faithful to upstream so the re-hosted weights load unchanged —
  # linted/formatted to upstream's style, not this repo's, exactly like a
  # `vendor/` tree.
  "sidecar/media_studio/features/_lightasd",
  "sidecar/media_studio/features/_vinet_s",
  "sidecar/media_studio/features/_transnetv2",
  "Inspirations & Former Attempts",
]

[tool.ruff.lint]
# Sane, deterministic rule set: pyflakes (F), pycodestyle (E/W), isort (I),
# pep8-naming (N), pyupgrade (UP), flake8-bugbear (B), comprehensions (C4),
# flake8-simplify (SIM). Auto-fixers run first; residuals are reported.
select = ["E", "F", "W", "I", "N", "UP", "B", "C4", "SIM"]
ignore = [
  "E501", # line length handled by the formatter
]

# Reasoned, greppable per-file suppressions (QUALITY-CHARTER §4). Each entry below
# documents why the residual lint finding is intentional rather than a defect.
[tool.ruff.lint.per-file-ignores]
# Tests may use assert and shadow names freely; test doubles deliberately mirror
# the lowercase attribute paths of the SDKs they stub.
"sidecar/tests/**" = [
  "N801",
  "N802",
  "N803",
  "N806",
  # Intentional test-local import aliases (`import subtitles as S`,
  # `from pathlib import Path as _P`) used to disambiguate fixtures.
  "N812",
  "N814",
]
# __main__ binds Windows SetErrorMode flag CONSTANTS as locals; UPPER_CASE is the
# correct, idiomatic spelling for these ctypes constants (N806 is a false positive
# here). SIM105: a best-effort optional-native import probe that already carries an
# inline `# noqa: BLE001` rationale; contextlib.suppress would drop that note.
"sidecar/media_studio/__main__.py" = ["N806", "SIM105"]
# Established public exception names (FfmpegNotFound / JobCancelled / ToolNotFound);
# renaming for the N818 `Error` suffix would break the cross-module raise/except API.
"sidecar/media_studio/ffmpeg.py" = ["N818"]
"sidecar/media_studio/jobs.py" = ["N818"]
"sidecar/media_studio/tools_resolver.py" = ["N818"]
# Best-effort cleanup / fire-and-forget blocks whose `except: pass` already carries
# an inline `# pragma: no cover` or rationale; contextlib.suppress would lose it.
"sidecar/media_studio/features/caption_remotion.py" = ["SIM105"]
"sidecar/media_studio/features/reframe_claudeshorts.py" = ["SIM105"]
"sidecar/media_studio/features/timeline.py" = ["SIM105"]
"sidecar/media_studio/features/tracks_audio.py" = ["SIM105"]
# Mid-file `import re` placed after a long explanatory seam comment block by design.
"sidecar/media_studio/features/boundary.py" = ["E402"]
# NOTE: the former library.py F811 ignore was retired once the `Project` dict
# alias was renamed to `ProjectData` (it no longer collides with `class Project`),
# which was also the root of the basedpyright `Project` cascade. No suppression
# is needed now.

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

# basedpyright type gate (pinned: basedpyright 1.39.8).
# typeCheckingMode = "standard" keeps "literal zero" achievable on partly-untyped code.
[tool.basedpyright]
typeCheckingMode = "standard"
pythonVersion = "3.12"
include = [
  "sidecar/media_studio",
]
exclude = [
  "**/node_modules",
  "**/__pycache__",
  ".venv",
  "sidecar/.venv",
  "**/tests",
  # Vendored third-party code (Light-ASD, MIT): kept byte-faithful to upstream and
  # only imported lazily on the GPU host (torch is not installed in the gate env),
  # so it is not type-gated to this repo's standard (mirrors the ruff exclude).
  "sidecar/media_studio/features/_lightasd",
]
# Resolve the sidecar import root (so `import media_studio.*` resolves).
extraPaths = [
  "sidecar",
]
reportMissingImports = "warning"
reportMissingModuleSource = "none"
