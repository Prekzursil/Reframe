# osv-scanner configuration for the lean dependency gate (pinned tool: osv-scanner 2.3.8).
# The gate runs osv-scanner over the lockfiles and must report 0 actionable CVEs.
#
# POLICY: ignore entries are allowed ONLY for a genuinely-unfixable vuln (no
# non-breaking upgrade) OR one that is provably not reachable in THIS product,
# each with a reason + dated review note (greppable). We do NOT use a baseline
# file — clean-zero is reached by upgrading where a safe fix exists, and only by
# a reasoned per-CVE ignore where it does not.
#
# Lockfiles scanned (see .github/workflows/quality.yml gate-deps step):
#   - app/package-lock.json            (Electron + renderer + main npm tree)
#   - app/render-cli/package-lock.json (Remotion render CLI npm tree)
#   - sidecar/requirements.lock.txt    (fully-pinned Python sidecar deps; generated
#                                        from sidecar/pyproject.toml via `uv pip
#                                        compile`. Scanned with --no-resolve so osv
#                                        reads the flat pins directly. Re-generate
#                                        on any sidecar dep change.)
#
# ---------------------------------------------------------------------------
# REACHABILITY BASELINE (the shared rationale for the electron/dev-tool ignores)
# ---------------------------------------------------------------------------
# Reframe / Media Studio is a LOCAL-FIRST, OFFLINE desktop app. The renderer is
# hardened (app/main/main.ts:314-328): contextIsolation:true, nodeIntegration:false,
# sandbox:true; in production it loads ONLY the bundled local index.html
# (`win.loadFile`), never remote/untrusted web content; external links are handed
# to the OS browser via setWindowOpenHandler({action:'deny'}). It does not browse
# the web, render attacker-controlled pages, or expose a dev server to a network.
#
# The npm CVEs below are therefore in two buckets:
#   (a) electron renderer/IPC/RCE-class issues that require loading hostile remote
#       content or a compromised renderer — NOT reachable given the above. The only
#       fixes are electron 35.7.5 / 38.8.6 / 39.8.x (a 4-7 major jump from the
#       pinned 31.x), which is a breaking runtime change held for a human-reviewed
#       upgrade (tracked below), NOT a silent CI bump.
#   (b) build/test-toolchain deps (vite/esbuild/vitest dev server, ws inside the
#       Remotion studio/bundler) that ship in NO packaged artifact and are not
#       exposed at runtime; their fixes require breaking major upgrades of the
#       electron-vite / Remotion toolchains.
# Each entry is dated and carries a review date so it is revisited, not forgotten.

# =========================================================================== #
