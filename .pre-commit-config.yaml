# Lean quality gates — local auto-fixers + fast checks.
# `pre-commit run --all-files` is the gate-1/gate-5 entrypoint used by CI (quality.yml).
# Every rev is pinned; bump versions here together with QUALITY-CHARTER.md + quality.yml.
minimum_pre_commit_version: "3.5.0"

default_language_version:
  python: python3

exclude: |-
  (?x)^(
    Inspirations\ &\ Former\ Attempts/|
    node_modules/|
    app/node_modules/|
    app/render-cli/node_modules/|
    app/out/|
    app/dist/|
    dist/|
    build/|
    vendor/|
    \.venv/|
    sidecar/\.venv/|
    .*\.egg-info/
  )

repos:
  # --- Gate 1: Python lint + format (ruff 0.15.17) ---
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff
        name: ruff (lint --fix)
        args: ["--fix"]
        files: '^sidecar/.*\.py$'
      - id: ruff-format
        name: ruff (format)
        files: '^sidecar/.*\.py$'

  # --- Gate 1: JS/TS lint (oxlint 1.69.0 mirror; npm pins 1.70.0) ---
  - repo: https://github.com/oxc-project/mirrors-oxlint
    rev: v1.69.0
    hooks:
      - id: oxlint
        name: oxlint (app)
        args: ["--config", "app/.oxlintrc.json", "--fix", "--deny-warnings"]
        files: '^app/(main|renderer/src|render-cli/src)/.*\.(ts|tsx|js|jsx)$'

  # --- Gate 1: JS/TS format (Biome 2.5.0, format-only) ---
  - repo: https://github.com/biomejs/pre-commit
    rev: v2.5.0
    hooks:
      - id: biome-format
        name: biome (format)
        additional_dependencies: ["@biomejs/biome@2.5.0"]
        files: '^app/(main|renderer/src|render-cli/src)/.*\.(ts|tsx|js|jsx|css|json)$'

  # --- Gate 5: secrets (gitleaks 8.30.1) ---
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        name: gitleaks (secrets)
        args: ["--config", ".gitleaks.toml"]
