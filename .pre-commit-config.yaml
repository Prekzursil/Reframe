# Lean quality gates — local auto-fixers + fast checks.
# `pre-commit run --all-files` is the gate-1/gate-5 entrypoint used by CI (quality.yml).
# Every rev is pinned; bump versions here together with QUALITY-CHARTER.md + quality.yml.
minimum_pre_commit_version: "3.5.0"

default_language_version:
  python: python3

exclude: |-
  (?x)^(
    Inspirations\ &\ Former\ Attempts/|
    node_modules/|
    apps/web/node_modules/|
    apps/desktop/node_modules/|
    \.venv/|
    \.tooling-bin/|
    dist/|
    .*\.egg-info/
  )

repos:
  # --- Gate 1: Python lint + format (ruff 0.15.17) ---
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff
        name: ruff (lint --fix)
        args: ["--fix"]
        files: '^(apps|services|packages)/.*\.py$'
      - id: ruff-format
        name: ruff (format)
        files: '^(apps|services|packages)/.*\.py$'

  # --- Gate 1: JS/TS lint (oxlint 1.69.0 mirror; npm pins 1.70.0) ---
  - repo: https://github.com/oxc-project/mirrors-oxlint
    rev: v1.69.0
    hooks:
      - id: oxlint
        name: oxlint (web)
        args: ["--config", "apps/web/.oxlintrc.json", "--fix", "--deny-warnings"]
        files: '^apps/web/src/.*\.(ts|tsx|js|jsx)$'
      - id: oxlint
        name: oxlint (desktop)
        alias: oxlint-desktop
        args: ["--config", "apps/desktop/.oxlintrc.json", "--fix", "--deny-warnings"]
        files: '^apps/desktop/src/.*\.(ts|tsx|js|jsx)$'

  # --- Gate 1: JS/TS format (Biome 2.5.0, format-only) ---
  - repo: https://github.com/biomejs/pre-commit
    rev: v2.5.0
    hooks:
      - id: biome-format
        name: biome (format)
        additional_dependencies: ["@biomejs/biome@2.5.0"]
        files: '^apps/(web|desktop)/src/.*\.(ts|tsx|js|jsx|css|json)$'

  # --- Gate 5: secrets (gitleaks 8.30.1) ---
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        name: gitleaks (secrets)
        args: ["--config", ".gitleaks.toml"]

  # --- Gate 1: Rust fmt + clippy (local toolchain, pinned via rust-toolchain.toml) ---
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt (src-tauri)
        language: system
        entry: bash -c 'cd apps/desktop/src-tauri && cargo fmt'
        files: '^apps/desktop/src-tauri/.*\.rs$'
        pass_filenames: false
      - id: cargo-clippy
        name: cargo clippy -D warnings (src-tauri)
        language: system
        entry: bash -c 'cd apps/desktop/src-tauri && cargo clippy --all-targets --all-features -- -D warnings'
        files: '^apps/desktop/src-tauri/.*\.rs$'
        pass_filenames: false
