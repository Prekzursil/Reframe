# electron-builder.yml — two-stage Windows packaging (CONTRACTS.md A7 / PLAN-P2 T5).
#
# STAGE 1 (this config): a SLIM artifact (< ~700 MB; NSIS has a ~2 GB format
# ceiling anyway): Electron app + render-cli + embeddable CPython 3.12 +
# ffmpeg/ffprobe + the pre-built Remotion bundle + the sidecar SOURCE.
# NO torch, NO heavy wheels, NO models — those install on first run
# (resources/sidecar/runtime_setup/bootstrap.py -> %APPDATA%/media-studio).
#
# Build (human-run; agents never run installs/builds):
#   1. build/python-embed-setup.ps1          # stages build/python-embed + build/ffmpeg/win (network)
#   2. cd app && npm run build               # electron-vite -> app/out
#   3. cd app/render-cli && npm run bundle   # T4a: writes render-cli/out/remotion-bundle
#   4. cd app && npx electron-builder --config ../electron-builder.yml --win
#   5. build/make-portable.ps1               # optional: zip + slim/size assertions
#
# Paths below are relative to the PROJECT dir (app/), because the build runs
# from app/ with `--config ../electron-builder.yml`.

appId: local.media-studio
productName: Reframe
# no publish/update/signing — local personal app (§0: no platform creep)
publish: null

directories:
  output: ../dist
  buildResources: ../build

# Renderer + main are fully bundled by electron-vite into out/; app node_modules
# are NOT shipped (react lands in the vite bundle). render-cli is its own
# package (T4a) — it ships ENTIRELY via extraResources below (never in asar:
# the sidecar spawns render.js + the native compositor from the real
# filesystem at resources/render-cli/..., the paths WIRING-T4A injects).
files:
  - out/**/*
  - package.json
  - "!render-cli/**"
  - "!node_modules/**"

asar: true

extraResources:
  # Remotion render CLI (T4a) — layout mirrors the dev tree so the supervisor
  # env vars are just process.resourcesPath + the same relative paths:
  #   MEDIA_STUDIO_RENDER_JS       -> resources/render-cli/dist/render.js
  #   MEDIA_STUDIO_REMOTION_BUNDLE -> resources/render-cli/out/remotion-bundle
  # node_modules carries @remotion/renderer + its native compositor (A4:
  # asar-free by construction here).
  - from: render-cli/dist
    to: render-cli/dist
  - from: render-cli/out/remotion-bundle
    to: render-cli/out/remotion-bundle
  - from: render-cli/node_modules
    to: render-cli/node_modules
  - from: render-cli/package.json
    to: render-cli/package.json
  # Embeddable CPython 3.12 (+ staged get-pip.py) — build/python-embed-setup.ps1
  - from: ../build/python-embed
    to: python
  # Dedicated embeddable CPython 3.14 (+ staged get-pip.py) for the ISOLATED
  # chatterbox voice-clone env — torch 2.10 only resolves on py3.14 (A4).
  # ChatterboxEngine + bootstrap resolve <resources>/python-chatterbox/python.exe.
  - from: ../build/python-embed-314
    to: python-chatterbox
  # Bundled ffmpeg/ffprobe (WU A3) — BtbN win64-LGPL STATIC exes, redistribution-
  # safe in a closed-source app when invoked as a separate child process (LGPL,
  # unmodified). PINNED release tag: autobuild-2026-07-03-13-21 / asset
  # ffmpeg-n7.1.5-1-g7d0e842004-win64-lgpl-7.1.zip (staged into build/ffmpeg/win/
  # by build/python-embed-setup.ps1 -WithFfmpeg). Ships OUTSIDE app.asar via
  # extraResources -> resources/bin/, resolved by ffmpeg.py's _BUNDLED_DIR and by
  # the MEDIA_STUDIO_FFMPEG/FFPROBE env the supervisor injects (WIRING-T5 §2 /
  # sidecar.ts buildSidecarEnv). LGPL obligation: the BtbN LICENSE.txt is shipped
  # alongside the exes (the "*.txt" filter below), and the exact source tag is
  # recorded here + in python-embed-setup.ps1.
  - from: ../build/ffmpeg/win
    to: bin
    filter:
      - "ffmpeg.exe"
      - "ffprobe.exe"
      - "*.txt"
  # The sidecar SOURCE (pure .py + the verthor WSL script + first-run setup).
  # Python cannot import from asar; ships as plain files under resources/.
  - from: ../sidecar/media_studio
    to: sidecar/media_studio
    filter:
      - "**/*.py"
      - "scripts/**"
      # Vendored model LICENSE files (extensionless) — _lightasd (MIT),
      # _transnetv2, _vinet_s (CC-BY-NC-SA). Attribution completeness, same as
      # ffmpeg's LGPL LICENSE.txt above. Glob is relative to the `from` base
      # (../sidecar/media_studio), so `**/LICENSE` resolves features/*/LICENSE.
      - "**/LICENSE"
  - from: ../sidecar/runtime_setup
    to: sidecar/runtime_setup
    filter:
      - "**/*.py"
      - "requirements-*.txt"
  # Runtime BrowserWindow icon (WU A2). The .ico is embedded into the exe by
  # win.icon above, but the running window loads a PNG via nativeImage; ship the
  # 512px master (+ the .ico as a fallback) to resources/icons/, resolved by
  # main.ts resolveWindowIcon() as process.resourcesPath/icons/reframe-512.png.
  - from: ../build/icons
    to: icons
    filter:
      - "reframe-512.png"
      - "reframe.ico"
win:
  # App icon (WU A2 — Concept A "Crop Pull"): the multi-size .ico (16/24/32/48/
  # 64/128/256, PNG-embedded) is the exe + taskbar icon. Path is relative to
  # buildResources (../build), i.e. ../build/icons/reframe.ico.
  icon: icons/reframe.ico
  # Two targets per T5: NSIS installer + portable zip (both slim).
  target:
    - target: nsis
      arch: [x64]
    - target: zip
      arch: [x64]
  artifactName: ${name}-${version}-win-${arch}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  # Installer + uninstaller chrome icon (WU A2). Same buildResources-relative
  # .ico as win.icon — replaces the default Electron icon everywhere.
  installerIcon: icons/reframe.ico
  uninstallerIcon: icons/reframe.ico
  # First-run state lives in %APPDATA%/media-studio (envs/models/tools);
  # uninstall keeps it so a reinstall needs no re-download.
  deleteAppDataOnUninstall: false
  shortcutName: Reframe

# Nothing native to rebuild in the app package itself (natives live in
# render-cli's own node_modules, shipped as-is, and in the first-run envs).
npmRebuild: false
nodeGypRebuild: false
electronLanguages: [en-US]
compression: normal
