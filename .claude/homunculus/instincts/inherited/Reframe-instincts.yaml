# Reframe Workflow Feature Or Bugfix With Tdd And Coverage

## Action

Follow the feature-or-bugfix-with-tdd-and-coverage workflow:
1. Modify or add implementation logic in the relevant source file(s)
2. Add or update corresponding test files to cover new or changed logic
3. Ensure tests assert both expected behavior and error/failure conditions (including fail-loud, no-silent-fallback cases)
4. Run the test suite to confirm 100% coverage (lines, branches, functions, statements)
5. Commit both implementation and test changes together

## Evidence

- Workflow detected from commit patterns
- Frequency: ~3x per month
- Files: sidecar/media_studio/features/reframe_claudeshorts.py, sidecar/tests/test_reframe_claudeshorts.py, sidecar/tests/e2e/_tiny_sidecar.py

